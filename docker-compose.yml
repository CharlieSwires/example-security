services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: example-security-backend
    ports:
      - "8080:8080"
    env_file:
      - ./env.list
    environment:
      INITIAL_SUPER_USERNAME: ${INITIAL_SUPER_USERNAME:-super}
      INITIAL_SUPER_PASSWORD: ${INITIAL_SUPER_PASSWORD:-ChangeThisPassword123!}
      SSL_ENABLED: ${SSL_ENABLED:-false}
    depends_on:
      - mongo
      - mailpit

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8080/ExampleSecurity}
    container_name: example-security-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

  mongo:
    image: mongo:7
    container_name: example-security-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  mailpit:
    image: axllent/mailpit:latest
    container_name: example-security-mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  mongo-data:
