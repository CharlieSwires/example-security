services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./env.list
    environment:
      # TLS is terminated at the load balancer for local Docker.
      # Browser still sees HTTPS on https://localhost:8080.
      SSL_ENABLED: ${SSL_ENABLED:-false}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      SESSION_COOKIE_SAME_SITE: ${SESSION_COOKIE_SAME_SITE:-none}
      SESSION_COLLECTION_NAME: ${SESSION_COLLECTION_NAME:-spring_sessions}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://localhost:5173}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-https://localhost:5173}
      BACKEND_BASE_URL: ${BACKEND_BASE_URL:-https://localhost:8080/ExampleSecurity}
    depends_on:
      - mongo
      - mailpit

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-https://localhost:8080/ExampleSecurity}
    depends_on:
      - backend

  load-balancer:
    image: nginx:1.31.1-alpine
    ports:
      # HTTPS frontend. Open https://localhost:5173
      - "5173:443"
      # HTTPS backend API. Frontend uses https://localhost:8080/ExampleSecurity
      - "8080:8080"
    volumes:
      - ./load-balancer/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  mongo-data:
