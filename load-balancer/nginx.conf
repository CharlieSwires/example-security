# Local Docker Compose load balancer.
# Browser-facing traffic is HTTPS on:
#   https://localhost:5173            -> frontend
#   https://localhost:8080/ExampleSecurity -> backend API
# Inside the Docker network, traffic is plain HTTP to the frontend/backend containers.

worker_processes auto;

events {}

http {
    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream frontend_pool {
        server frontend:80;
    }

    upstream backend_pool {
        server backend:8080;
    }

    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate     /etc/nginx/certs/keystore.crt;
        ssl_certificate_key /etc/nginx/certs/keystore.key;
 
        location / {
            proxy_pass http://frontend_pool;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host:$server_port;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    server {
        listen 8080 ssl;
        server_name localhost;

        ssl_certificate     /etc/nginx/certs/keystore.crt;
        ssl_certificate_key /etc/nginx/certs/keystore.key;
        
        location / {
            proxy_pass http://backend_pool;

            proxy_http_version 1.1;
            proxy_set_header Host $host:$server_port;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
